naftiko: 1.0.0-alpha2
info:
  label: At-Bay Partner API — Quotes
  description: >-
    At-Bay Partner API — Quotes. Create a quote, poll for status, and request
    a bind. Self-contained Naftiko capability covering the quote business
    surface for Surplus Cyber, Tech E&O, and MPL.
  tags:
    - At-Bay
    - Quotes
    - Insurance
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      AT_BAY_TOKEN: AT_BAY_TOKEN
capability:
  consumes:
    - type: http
      namespace: quotes
      baseUri: https://api.at-bay.com/v2
      description: At-Bay Partner API quote endpoints.
      resources:
        - name: quotes
          path: /quotes
          operations:
            - name: createQuote
              method: POST
              description: Create A Quote
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Quote request body (client + policy + broker).
                  required: true
        - name: quote-by-id
          path: /quotes/{quote_identifier}
          operations:
            - name: getQuote
              method: GET
              description: Find A Quote
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: quote_identifier
                  in: path
                  type: string
                  required: true
        - name: bind-quote
          path: /quotes/{quote_identifier}/bind
          operations:
            - name: bindQuote
              method: POST
              description: Bind A Quote
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: quote_identifier
                  in: path
                  type: string
                  required: true
                - name: body
                  in: body
                  type: object
                  required: true
      authentication:
        type: bearer
        value: '{{env.AT_BAY_TOKEN}}'
        placement: header
  exposes:
    - type: rest
      namespace: quotes-rest
      port: 8080
      description: REST adapter for the At-Bay Quotes capability.
      resources:
        - path: /v1/quotes
          name: quotes
          description: REST surface for /quotes.
          operations:
            - method: POST
              name: createQuote
              description: Create A Quote
              call: quotes.createQuote
              with:
                body: rest.body
        - path: /v1/quotes/{quote_identifier}
          name: quote-by-id
          description: REST surface for an individual quote.
          operations:
            - method: GET
              name: getQuote
              description: Find A Quote
              call: quotes.getQuote
              with:
                quote_identifier: rest.path.quote_identifier
        - path: /v1/quotes/{quote_identifier}/bind
          name: bind-quote
          description: REST surface for binding a quote.
          operations:
            - method: POST
              name: bindQuote
              description: Bind A Quote
              call: quotes.bindQuote
              with:
                quote_identifier: rest.path.quote_identifier
                body: rest.body
