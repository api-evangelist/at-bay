naftiko: 1.0.0-alpha2
info:
  label: At-Bay Partner API — Webhooks
  description: >-
    At-Bay Partner API — Webhooks. Register and manage webhook callbacks for
    asynchronous quote and policy status events, and rotate the shared
    signing secret used to verify callback authenticity.
  tags:
    - At-Bay
    - Webhooks
    - Insurance
    - Events
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      AT_BAY_TOKEN: AT_BAY_TOKEN
capability:
  consumes:
    - type: http
      namespace: webhooks
      baseUri: https://api.at-bay.com/v2
      description: At-Bay webhook management endpoints.
      resources:
        - name: webhooks
          path: /webhooks
          operations:
            - name: listWebhooks
              method: GET
              description: List Webhooks
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: $.
              inputParameters: []
            - name: registerWebhook
              method: POST
              description: Register A Webhook
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  required: true
        - name: webhook-by-id
          path: /webhooks/{webhook_id}
          operations:
            - name: unregisterWebhook
              method: DELETE
              description: Unregister A Webhook
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: webhook_id
                  in: path
                  type: string
                  required: true
        - name: webhook-secret
          path: /webhooks/secret
          operations:
            - name: setWebhookSecret
              method: PUT
              description: Set Webhook Secret
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  required: true
      authentication:
        type: bearer
        value: '{{env.AT_BAY_TOKEN}}'
        placement: header
  exposes:
    - type: rest
      namespace: webhooks-rest
      port: 8080
      description: REST adapter for At-Bay webhook operations.
      resources:
        - path: /v1/webhooks
          name: webhooks
          description: Webhook registry.
          operations:
            - method: GET
              name: listWebhooks
              description: List Webhooks
              call: webhooks.listWebhooks
              with: {}
            - method: POST
              name: registerWebhook
              description: Register A Webhook
              call: webhooks.registerWebhook
              with:
                body: rest.body
        - path: /v1/webhooks/{webhook_id}
          name: webhook-by-id
          description: A single webhook.
          operations:
            - method: DELETE
              name: unregisterWebhook
              description: Unregister A Webhook
              call: webhooks.unregisterWebhook
              with:
                webhook_id: rest.path.webhook_id
        - path: /v1/webhooks/secret
          name: webhook-secret
          description: Webhook signing secret.
          operations:
            - method: PUT
              name: setWebhookSecret
              description: Set Webhook Secret
              call: webhooks.setWebhookSecret
              with:
                body: rest.body
