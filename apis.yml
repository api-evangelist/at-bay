aid: at-bay
name: At-Bay
description: >-
  At-Bay is an InsurSec company that combines cyber insurance with proactive
  security monitoring for businesses. Headquartered in New York with offices in
  San Francisco and Tel Aviv, At-Bay underwrites Surplus Cyber, Surplus Tech
  E&O, and Surplus Miscellaneous Professional Liability (MPL) coverage and
  bundles them with the At-Bay Stance security platform (advisory, fraud
  defense, incident response) and 24/7 Managed Detection and Response (MDR)
  across endpoint, email (MXDR), and multi-vector surfaces. At-Bay distributes
  through a network of independent brokers and partners and exposes a
  production-grade REST Partner API (v2) that lets brokerage platforms,
  digital distributors, and agency management systems quote, customize, bind,
  renew, retrieve documents, and receive webhook callbacks for the full
  policy lifecycle. Demo environment at api-demo.at-bay.com lets partners
  integrate without going through Broker of Record clearance.
