        type: NaftikoCapability
    description: >-
      End-to-end Partner REST API (v2) for the At-Bay quote-to-bind-to-renew
      workflow. Supports three insurance products selected via the
      `insurance_product` field on the policy object: CYB (Surplus Cyber),
      TEO (Surplus Tech E&O), and MPL (Surplus MPL). Core operations: POST
      /quotes to submit a new quote, GET /quotes/{quote_identifier} polled
      every 10 seconds until status leaves `quote_pending` (typical p90
      under 40 seconds), bind/referral/update operations, document upload
      and download, auto-renewal pause, plus webhook registration and
      verification for asynchronous status callbacks. JWT bearer
      authentication; production at api.at-bay.com/v2 and demo at
      api-demo.at-bay.com/v2. Production submissions are subject to
      Broker-of-Record (BOR) clearance — duplicate domains/addresses within
      60 days are blocked; the demo environment bypasses BOR.
